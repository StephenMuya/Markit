services:
  # Web Service for the Audio System Logic
  - type: web
    name: workana-audio-system
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NOTION_API_KEY
        sync: false
      - key: PEOPLE_DB_ID
        sync: false

  # Background Worker for Scraping (Optional - Cron Job better)
  # Render Cron Jobs are great for the scraper
  - type: cron
    name: workana-scraper
    env: python
    plan: free
    schedule: "0 9 * * *" # Every day at 9 AM
    buildCommand: pip install -r requirements.txt && python -m playwright install chromium
    startCommand: python scraping_system/scraper.py && python scraping_system/extractor.py && python scraping_system/integration.py
    envVars:
      - key: NOTION_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FIRMS_DB_ID
        sync: false
      - key: EQUITY_DB_ID
        sync: false
