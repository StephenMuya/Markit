services:
  # PostgreSQL Database
  - type: pserv
    name: notionflow-db
    plan: free
    env: docker
    region: oregon
    databases:
      - name: notionflow
        
  # Java Spring Boot Backend API
  - type: web
    name: notionflow-backend
    env: java
    plan: free
    buildCommand: cd backend && ./gradlew build -x test
    startCommand: cd backend && java -jar build/libs/notionflow-backend-1.0.0.jar
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: notionflow-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: notionflow-db
          property: port
      - key: DB_NAME
        value: notionflow
      - key: DB_USER
        fromDatabase:
          name: notionflow-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: notionflow-db
          property: password
          
  # Python Scraper (Cron Job - runs daily)
  - type: cron
    name: notionflow-scraper
    env: python
    plan: free
    schedule: "0 0 * * *"  # Daily at midnight
    buildCommand: pip install -r requirements.txt && python -m playwright install
    startCommand: cd scraping_system && python scraper.py && python extractor.py && python integration.py
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: DB_HOST
        fromDatabase:
          name: notionflow-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: notionflow-db
          property: port
      - key: DB_NAME
        value: notionflow
      - key: DB_USER
        fromDatabase:
          name: notionflow-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: notionflow-db
          property: password
      - key: MAX_ARTICLES_PER_SOURCE
        value: "50"
